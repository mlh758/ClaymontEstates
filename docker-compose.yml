services:
  db:
    image: postgres:17
    environment:
      POSTGRES_DB: hoa
      POSTGRES_USER: hoa
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hoa"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
